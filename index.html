<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quittances de loyer — Jean NATCHIMIE</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f0f2f5;color:#222}
.app{max-width:920px;margin:0 auto;padding:16px}
h1{font-size:20px;color:#1a5276;margin-bottom:16px;text-align:center}
.save-indicator{text-align:center;font-size:11px;color:#27ae60;margin-bottom:8px;height:16px;transition:opacity .5s}
.tabs{display:flex;gap:6px;margin-bottom:16px;border-bottom:2px solid #1a5276;padding-bottom:8px}
.tab{padding:8px 18px;font-size:13px;border:1px solid #ccc;border-radius:6px 6px 0 0;background:#fff;cursor:pointer;color:#555}
.tab.active{background:#1a5276;color:#fff;border-color:#1a5276}
.panel{display:none}.panel.active{display:block}
.section{background:#fff;border:1px solid #ddd;border-radius:8px;padding:16px;margin-bottom:14px}
.section-title{font-size:11px;font-weight:bold;color:#1a5276;text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px;background:#e8f0f8;padding:4px 8px;border-radius:4px}
.row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:8px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:8px}
.row4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px;margin-bottom:8px}
.field{display:flex;flex-direction:column;gap:3px}
label{font-size:11px;color:#555;font-weight:bold}
input,select,textarea{font-family:Arial,sans-serif;font-size:13px;padding:6px 8px;border:1px solid #ccc;border-radius:4px;width:100%}
input:focus,select:focus{outline:none;border-color:#1a5276}
.btn{padding:8px 16px;font-size:13px;border:1px solid #ccc;border-radius:6px;background:#fff;cursor:pointer;color:#222}
.btn:hover{background:#f5f5f5}
.btn-green{background:#27ae60;color:#fff;border-color:#27ae60}
.btn-green:hover{background:#219a52}
.btn-blue{background:#1a5276;color:#fff;border-color:#1a5276}
.btn-blue:hover{background:#154360}
.btn-red{background:#fff;color:#c0392b;border-color:#c0392b}
.btn-red:hover{background:#fdf2f2}
.total-box{background:#eaf2ff;border:1px solid #1a5276;border-radius:8px;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;margin-top:8px}
.total-val{font-size:22px;font-weight:bold;color:#1a5276}
.preview-box{background:#fafafa;border:1px solid #ddd;border-radius:8px;padding:20px;font-size:13px;line-height:1.7;margin-top:8px}
.preview-table{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:10px}
.preview-table td{padding:6px 8px;border-bottom:1px solid #e0e0e0}
.preview-table .total-row td{font-weight:bold;background:#1a5276;color:#fff;border:none}
.loc-card{background:#fff;border:1px solid #ddd;border-radius:8px;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.loc-card:hover{border-color:#1a5276}
.loc-name{font-weight:bold;font-size:14px;color:#1a5276}
.loc-meta{font-size:12px;color:#666;margin-top:2px}
.badge{display:inline-block;font-size:10px;padding:2px 7px;border-radius:20px;background:#e8f0f8;color:#1a5276;margin-left:6px}
.msg-box{background:#f9f9f9;border:1px solid #ddd;border-radius:6px;padding:12px;white-space:pre-wrap;font-size:12px;font-family:monospace;line-height:1.6;margin-top:8px}
.alert-ok{font-size:12px;color:#27ae60;background:#eafaf1;border:1px solid #27ae60;border-radius:4px;padding:6px 10px;margin-top:6px;display:none}
.actions-row{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.reset-zone{text-align:right;margin-top:6px}
.empty-state{text-align:center;color:#aaa;font-size:13px;padding:20px}
.num-label{font-size:11px;color:#888}
.storage-bar{background:#e8f5e9;border:1px solid #27ae60;border-radius:6px;padding:6px 12px;font-size:11px;color:#1a6b2a;display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
</style>
</head>
<body>
<div class="app">
<h1>📋 Gestion des Quittances de Loyer</h1>
<div id="save-indicator" class="save-indicator"></div>

<div class="tabs">
  <button class="tab active" onclick="showTab('locataires')">👥 Locataires</button>
  <button class="tab" onclick="showTab('quittance')">📄 Générer quittance</button>
  <button class="tab" onclick="showTab('envoi')">📤 Préparer envoi</button>
</div>

<!-- TAB LOCATAIRES -->
<div id="tab-locataires" class="panel active">
  <div id="storage-bar" class="storage-bar">
    <span>💾 Données sauvegardées localement sur cet appareil</span>
    <span id="storage-info"></span>
  </div>
  <div class="section">
    <div class="section-title">Bailleur</div>
    <div class="row">
      <div class="field"><label>Nom complet</label><input id="b_nom" onchange="saveAll()"/></div>
      <div class="field"><label>Adresse</label><input id="b_adr" onchange="saveAll()"/></div>
    </div>
  </div>
  <div class="section">
    <div class="section-title">Locataires</div>
    <div id="loc-list"></div>
    <div style="margin-top:10px;display:flex;justify-content:space-between;align-items:center">
      <button class="btn btn-blue" onclick="toggleAddForm()">+ Ajouter un locataire</button>
      <div class="reset-zone"><button class="btn btn-red" style="font-size:11px;padding:5px 10px" onclick="resetAll()">🗑 Tout effacer</button></div>
    </div>
    <div id="add-form" style="display:none;background:#eaf2ff;border:1px solid #1a5276;border-radius:8px;padding:14px;margin-top:12px">
      <div class="row"><div class="field"><label>Nom complet</label><input id="nf_nom" placeholder="DUPONT Marie"/></div><div class="field"><label>Bien loué</label><input id="nf_bien" placeholder="Appt T2, Résidence X"/></div></div>
      <div class="row3">
        <div class="field"><label>Loyer HC (€)</label><input id="nf_loyer" type="number" placeholder="600"/></div>
        <div class="field"><label>Charges (€)</label><input id="nf_charges" type="number" placeholder="0"/></div>
        <div class="field"><label>Canal</label><select id="nf_canal"><option value="whatsapp">WhatsApp</option><option value="email">Email</option></select></div>
      </div>
      <div class="row">
        <div class="field"><label>Contact (+596… ou email)</label><input id="nf_contact"/></div>
        <div class="field" style="flex-direction:row;align-items:flex-end;gap:8px">
          <button class="btn" onclick="toggleAddForm()">Annuler</button>
          <button class="btn btn-blue" onclick="addLocataire()">Ajouter</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- TAB QUITTANCE -->
<div id="tab-quittance" class="panel">
  <div class="section">
    <div class="section-title">Locataire</div>
    <div class="field"><label>Sélectionner</label><select id="q_loc" onchange="onLocChange()"></select></div>
  </div>
  <div class="section">
    <div class="section-title">Période & Dates</div>
    <div class="row3">
      <div class="field"><label>Début de période</label><input type="date" id="q_debut" onchange="updatePreview()"/></div>
      <div class="field"><label>Fin de période</label><input type="date" id="q_fin" onchange="updatePreview()"/></div>
      <div class="field"><label>Date de délivrance</label><input type="date" id="q_deliv" onchange="updatePreview()"/></div>
    </div>
  </div>
  <div class="section">
    <div class="section-title">Montants</div>
    <div class="row4">
      <div class="field"><label>Loyer HC (€)</label><input type="number" id="q_loyer" onchange="updatePreview()"/></div>
      <div class="field"><label>Charges (€)</label><input type="number" id="q_charges" onchange="updatePreview()"/></div>
      <div class="field"><label>Aide CAF (€)</label><input type="number" id="q_caf" value="0" onchange="updatePreview()"/></div>
      <div class="field"><label>Versement locataire (€)</label><input type="number" id="q_vers" onchange="updatePreview()"/></div>
    </div>
    <div class="field" style="margin-top:8px"><label>Message important (optionnel)</label><input id="q_msg" placeholder="ex: 96,50 € correspond à la TEOM réparti"/></div>
    <div class="total-box"><span style="font-size:13px;color:#555">Total payé</span><span class="total-val" id="q_total">0,00 €</span></div>
  </div>
  <div class="section">
    <div class="section-title">Aperçu quittance</div>
    <div id="preview-box" class="preview-box"></div>
    <div class="actions-row">
      <button class="btn btn-green" onclick="generatePDF()">⬇ Télécharger PDF</button>
      <button class="btn btn-blue" onclick="showTab('envoi')">📤 Préparer l'envoi</button>
    </div>
  </div>
</div>

<!-- TAB ENVOI -->
<div id="tab-envoi" class="panel">
  <div class="section">
    <div class="section-title">Locataire</div>
    <div class="field"><label>Sélectionner</label><select id="e_loc" onchange="updateEnvoi()"></select></div>
  </div>
  <div id="envoi-content"></div>
</div>

</div><!-- /app -->

const STORAGE_KEY = "quittances_jnd_v2";
let state = {};

/* ── Persistance localStorage ──────────────────────── */
function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      state = JSON.parse(raw);
      // migration: s'assurer que counters existe
      if (!state.counters) state.counters = {};
    } else {
      state = JSON.parse(JSON.stringify(DEFAULT_DATA));
    }
  } catch(e) {
    state = JSON.parse(JSON.stringify(DEFAULT_DATA));
  }
}

function saveAll() {
  state.bailleur.nom = document.getElementById("b_nom").value;
  state.bailleur.adresse = document.getElementById("b_adr").value;
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    showSaved();
    updateStorageInfo();
  } catch(e) {
    alert("Stockage local plein ou indisponible.");
  }
}

function showSaved() {
  const el = document.getElementById("save-indicator");
  el.textContent = "✓ Sauvegardé automatiquement";
  el.style.opacity = "1";
  clearTimeout(el._t);
  el._t = setTimeout(() => el.style.opacity = "0", 2000);
}

function updateStorageInfo() {
  const raw = localStorage.getItem(STORAGE_KEY) || "";
  const kb = (raw.length / 1024).toFixed(1);
  document.getElementById("storage-info").textContent = kb + " Ko utilisés";
}

function resetAll() {
  if (!confirm("Effacer toutes les données ? Cette action est irréversible.")) return;
  localStorage.removeItem(STORAGE_KEY);
  state = JSON.parse(JSON.stringify(DEFAULT_DATA));
  initUI();
}

/* ── Numérotation persistante ──────────────────────── */
function getNextNum(y, m) {
  const key = y + "-" + String(m).padStart(2,"0");
  if (!state.counters[key]) state.counters[key] = 0;
  state.counters[key]++;
  saveAll();
  return state.counters[key];
}

/* ── Helpers ───────────────────────────────────────── */
function fmt(d) { if(!d)return""; const p=d.split("-"); return p[2]+"/"+p[1]+"/"+p[0]; }
function fmtMois(d) {
  if(!d)return"";
  const M=["janvier","février","mars","avril","mai","juin","juillet","août","septembre","octobre","novembre","décembre"];
  const p=d.split("-"); return M[+p[1]-1]+" "+p[0];
}
function euro(n) { return(+n||0).toFixed(2).replace(".",",")+"\u00a0€"; }

/* ── Navigation onglets ────────────────────────────── */
function showTab(t) {
  document.querySelectorAll(".tab").forEach(b => b.classList.remove("active"));
  document.querySelectorAll(".tab").forEach(b => { if(b.getAttribute("onclick").includes("'"+t+"'")) b.classList.add("active"); });
  document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
  document.getElementById("tab-"+t).classList.add("active");
  if(t==="quittance"||t==="envoi") refreshSelects();
}

/* ── Rendu liste locataires ────────────────────────── */
function renderLocs() {
  const el = document.getElementById("loc-list");
  if (!state.locataires.length) {
    el.innerHTML = '<div class="empty-state">Aucun locataire — cliquez sur « + Ajouter »</div>';
    return;
  }
  el.innerHTML = state.locataires.map((l,i) => `
    <div class="loc-card">
      <div style="flex:1">
        <div class="loc-name">${l.nom||"<em style='color:#aaa'>Slot libre</em>"}<span class="badge">${l.canal}</span></div>
        <div class="loc-meta">${l.bien||"—"}</div>
        <div class="loc-meta">${l.loyer?(euro(l.loyer+l.charges)+" / mois"):""}</div>
      </div>
      <div style="display:flex;gap:6px">
        <button class="btn" style="font-size:12px" onclick="editLoc(${i})">✏️</button>
        <button class="btn btn-red" style="font-size:12px" onclick="removeLoc(${i})">✕</button>
      </div>
    </div>`).join("");
}

function removeLoc(i) {
  if(confirm("Supprimer ce locataire ?")) {
    state.locataires.splice(i,1);
    renderLocs(); saveAll();
  }
}

function editLoc(i) {
  const l = state.locataires[i];
  document.getElementById("nf_nom").value = l.nom;
  document.getElementById("nf_bien").value = l.bien;
  document.getElementById("nf_loyer").value = l.loyer;
  document.getElementById("nf_charges").value = l.charges;
  document.getElementById("nf_canal").value = l.canal;
  document.getElementById("nf_contact").value = l.contact;
  state.locataires.splice(i,1);
  renderLocs(); saveAll();
  document.getElementById("add-form").style.display = "block";
}

function toggleAddForm() {
  const f = document.getElementById("add-form");
  f.style.display = f.style.display === "none" ? "block" : "none";
}

function addLocataire() {
  const nom = document.getElementById("nf_nom").value.trim();
  if (!nom) { alert("Nom requis"); return; }
  state.locataires.push({
    nom, bien: document.getElementById("nf_bien").value,
    loyer: +document.getElementById("nf_loyer").value||0,
    charges: +document.getElementById("nf_charges").value||0,
    canal: document.getElementById("nf_canal").value,
    contact: document.getElementById("nf_contact").value
  });
  toggleAddForm();
  ["nf_nom","nf_bien","nf_loyer","nf_charges","nf_contact"].forEach(id => document.getElementById(id).value="");
  renderLocs(); saveAll(); refreshSelects();
}

/* ── Selects locataires ────────────────────────────── */
function refreshSelects() {
  ["q_loc","e_loc"].forEach(id => {
    const s = document.getElementById(id);
    const v = s.value;
    s.innerHTML = state.locataires.map((l,i) =>
      `<option value="${i}">${l.nom||"Slot libre #"+(i+1)}</option>`).join("");
    if(v) s.value = v;
  });
  onLocChange(); updateEnvoi();
}

/* ── Quittance ─────────────────────────────────────── */
function onLocChange() {
  const i = +document.getElementById("q_loc").value;
  const l = state.locataires[i] || state.locataires[0];
  if(!l) return;
  document.getElementById("q_loyer").value = l.loyer;
  document.getElementById("q_charges").value = l.charges;
  document.getElementById("q_vers").value = l.loyer + l.charges;
  updatePreview();
}

function getQ() {
  const i = +document.getElementById("q_loc").value;
  const l = state.locataires[i] || state.locataires[0] || {};
  const loyer = +(document.getElementById("q_loyer").value)||0;
  const charges = +(document.getElementById("q_charges").value)||0;
  const caf = +(document.getElementById("q_caf").value)||0;
  const vers = +(document.getElementById("q_vers").value)||(loyer+charges-caf);
  return {
    l, loyer, charges, caf, vers,
    debut: document.getElementById("q_debut").value,
    fin: document.getElementById("q_fin").value,
    deliv: document.getElementById("q_deliv").value,
    msg: document.getElementById("q_msg").value,
    total: loyer+charges
  };
}

  const q = getQ();

  const bn = state.bailleur.nom;

  const mo = q.debut ? q.debut.substring(5,7) : "??";
  document.getElementById("preview-box").innerHTML = `
    <div style="display:flex;justify-content:space-between;border-bottom:2px solid #1a5276;padding-bottom:10px;margin-bottom:14px">
      <div><strong>DE : ${bn}</strong><br><small style="color:#666">${ba}</small><br><span class="num-label">N° QL-${y}-${mo}-XXX</span></div>
      <div style="text-align:right"><strong>À : ${q.l.nom||"—"}</strong><br><small style="color:#666">${q.l.bien||"—"}</small><br><small class="num-label">Délivrée le ${fmt(q.deliv)||"—"}</small></div>
    </div>
    <div style="background:#e8f5e9;border-left:3px solid #2e7d32;padding:8px 12px;margin-bottom:12px;font-size:12px">
      <strong>Détails du terme</strong><br>
      Location : <strong>${q.l.bien||"—"}</strong><br>
      Période du ${fmt(q.debut)||"—"} au ${fmt(q.fin)||"—"}

    <table class="preview-table">
      <tr><td>Loyer</td><td style="text-align:right">${euro(q.loyer)}</td></tr>
      <tr><td>Charges</td><td style="text-align:right">${euro(q.charges)}</td></tr>
      ${q.caf>0?`<tr><td>Aide CAF</td><td style="text-align:right;color:#27ae60">- ${euro(q.caf)}</td></tr>`:""}
      <tr class="total-row"><td><strong>TOTAL PAYÉ</strong></td><td style="text-align:right"><strong>${euro(q.vers)}</strong></td></tr>
    </table>
    <div style="text-align:right;font-size:12px;margin-bottom:6px">
      <strong>${bn}</strong><br>
      <img src="data:image/png;base64,${SIG_B64}" style="height:40px;margin-top:4px" alt="Signature"/>

/* ── Génération PDF ────────────────────────────────── */
function generatePDF() {
  if(typeof window.jspdf==="undefined"){alert("PDF en cours de chargement, réessayez dans 2s");return}
  const {jsPDF} = window.jspdf;
  const q = getQ();
  const bn = state.bailleur.nom;
  const ba = state.bailleur.adresse;
  const y = q.debut?q.debut.substring(0,4):new Date().getFullYear();
  const mo = q.debut?q.debut.substring(5,7):String(new Date().getMonth()+1).padStart(2,"0");
  const num = getNextNum(+y,+mo);
  const numStr = "QL-"+y+"-"+mo+"-"+String(num).padStart(3,"0");
  const mois = fmtMois(q.debut).toUpperCase();

  const doc = new jsPDF({unit:"mm",format:"a4"});
  const lm=15, rm=195, w=180;
  const GREEN="#2E7D32", DARKGREEN="#1B5E20", LIGHTGREEN="#C8E6C9";

  // Bandeau vert header
  doc.setFillColor(46,125,50); doc.rect(0,0,210,28,"F");
  doc.setTextColor(255,255,255);
  doc.setFont("helvetica","bold"); doc.setFontSize(20);
  doc.text("Quittance de loyer",105,12,{align:"center"});
  doc.setFontSize(9); doc.setFont("helvetica","normal");
  doc.text("Logiciel de gestion de biens immobiliers",105,20,{align:"center"});

  // Blocs DE / À
  doc.setFillColor(232,245,233); doc.rect(0,28,210,30,"F");
  doc.setDrawColor(46,125,50); doc.setLineWidth(0.5);
  doc.rect(lm,30,87,26); doc.rect(108,30,87,26);

  doc.setTextColor(0,0,0); doc.setFontSize(9); doc.setFont("helvetica","bold");
  doc.text("DE : "+bn,lm+3,38);
  doc.setFont("helvetica","normal"); doc.setFontSize(8); doc.setTextColor(80,80,80);
  const baLines = doc.splitTextToSize(ba,81);
  doc.text(baLines,lm+3,44);
  doc.setTextColor(140,140,140); doc.setFontSize(7);
  doc.text(numStr,lm+3,53);

  doc.setTextColor(0,0,0); doc.setFont("helvetica","bold"); doc.setFontSize(9);
  doc.text("À : "+q.l.nom,111,38);
  doc.setFont("helvetica","normal"); doc.setFontSize(8); doc.setTextColor(80,80,80);
  const bienLines = doc.splitTextToSize(q.l.bien||"",81);
  doc.text(bienLines,111,44);
  doc.setTextColor(140,140,140); doc.setFontSize(7);
  doc.text("Délivrée le "+fmt(q.deliv),rm-2,53,{align:"right"});

  // Section détails
  let cy = 64;
  doc.setFillColor(46,125,50); doc.rect(lm,cy,w,7,"F");
  doc.setTextColor(255,255,255); doc.setFontSize(9); doc.setFont("helvetica","bold");
  doc.text("Détails du terme",lm+3,cy+5);

  cy += 10; doc.setTextColor(0,0,0); doc.setFont("helvetica","normal"); doc.setFontSize(9);
  doc.text("Veuillez trouver ci-dessous le détail de votre quittance de loyer pour votre location :",lm,cy);
  cy += 5; doc.setFont("helvetica","bold");
  doc.text(q.l.bien||"",lm,cy);
  cy += 5; doc.setFont("helvetica","normal"); doc.setTextColor(80,80,80);
  doc.text("Pour la période commençant le "+fmt(q.debut)+"  et finissant le "+fmt(q.fin),lm,cy);

  // Tableau montants
  cy += 8;
  const lignes = [["Loyer",q.loyer],["Charges",q.charges]];
  if(q.caf>0) lignes.push(["Aide CAF",-q.caf]);
  lignes.forEach(([lb,mt],i) => {
    doc.setFillColor(i%2===0?245:255,i%2===0?245:255,i%2===0?245:255);
    doc.rect(lm,cy,w,7,"F");
    doc.setDrawColor(200,200,200); doc.setLineWidth(0.2); doc.line(lm,cy+7,rm,cy+7);
    doc.setTextColor(0,0,0); doc.setFont("helvetica","normal"); doc.setFontSize(9);
    doc.text(lb,lm+3,cy+5);
    const v = mt<0 ? "- "+euro(-mt) : euro(mt);
    doc.text(v,rm-3,cy+5,{align:"right"}); cy+=7;
  });

  // Total payé
  doc.setFillColor(27,94,32); doc.rect(lm,cy,w,10,"F");
  doc.setTextColor(255,255,255); doc.setFont("helvetica","bold"); doc.setFontSize(11);
  doc.text("TOTAL PAYÉ",lm+3,cy+7);
  doc.text(euro(q.vers),rm-3,cy+7,{align:"right"});
  cy += 16;

  // Signature
  doc.setTextColor(0,0,0); doc.setFont("helvetica","bold"); doc.setFontSize(9);
  doc.text(bn,rm-3,cy,{align:"right"});
  cy += 4;
  try {
    doc.addImage("data:image/png;base64,"+SIG_B64,"PNG",rm-55,cy,52,22);
    cy += 24;
  } catch(e) { cy += 4; }

  doc.setDrawColor(46,125,50); doc.setLineWidth(0.3); doc.line(lm,cy,rm,cy);

  // Message important
  if(q.msg) {
    cy += 4;
    const msgLines = doc.splitTextToSize(q.msg,w-6);
    const mh = 8 + msgLines.length*4.5;
    doc.setFillColor(255,253,231); doc.rect(lm,cy,w,mh,"F");
    doc.setDrawColor(240,180,0); doc.setLineWidth(0.3); doc.rect(lm,cy,w,mh);
    doc.setFont("helvetica","bold"); doc.setFontSize(8); doc.setTextColor(184,134,11);
    doc.text("⚠ Message important",lm+3,cy+5);
    doc.setFont("helvetica","normal"); doc.setTextColor(0,0,0);
    doc.text(msgLines,lm+3,cy+10);
    cy += mh+4;
  }

  // Footer
  doc.setDrawColor(46,125,50); doc.setLineWidth(0.8);
  doc.line(lm,282,rm,282);
  doc.setFont("helvetica","normal"); doc.setFontSize(7); doc.setTextColor(150,150,150);
  doc.text("Logiciel de gestion de biens immobiliers – Document généré automatiquement",105,287,{align:"center"});

  const fname = "Quittance_"+(q.l.nom||"locataire").replace(/\s+/g,"_")+"_"+mois.replace(/\s/g,"_")+".pdf";
  doc.save(fname);
}

/* ── Envoi ─────────────────────────────────────────── */
function updateEnvoi() {
  const i = +document.getElementById("e_loc").value;
  const l = state.locataires[i] || {};
  const q = getQ();
  const bn = state.bailleur.nom;
  const el = document.getElementById("envoi-content");
  if(!l.nom){el.innerHTML="<div class='section'><p style='color:#aaa'>Slot vide — saisir un locataire d'abord.</p></div>";return}
  if(l.canal==="whatsapp"){
    const num = l.contact.replace(/\s/g,"").replace("+","");
    const msg = `Bonjour ${l.nom.split(" ").pop()} 👋\n\nVoici votre quittance de loyer pour *${fmtMois(q.debut)}* :\n\n📍 ${l.bien}\n📅 Période : du ${fmt(q.debut)} au ${fmt(q.fin)}\n💶 Loyer : ${euro(q.loyer)}\n✅ Total payé : ${euro(q.vers)}\n📄 Délivrée le ${fmt(q.deliv)||"aujourd'hui"}${q.msg?"\n\n⚠️ "+q.msg:""}\n\nLa quittance PDF vous est transmise en pièce jointe.\n\nCordialement,\n${bn}`;
    el.innerHTML=`<div class="section"><div class="section-title">Message WhatsApp</div><div id="wa-msg" class="msg-box">${msg}</div><div class="actions-row"><button class="btn btn-blue" onclick="copyMsg('wa-msg','al-wa')">📋 Copier</button><button class="btn btn-green" onclick="openWA('${num}')">💬 Ouvrir WhatsApp</button></div><div id="al-wa" class="alert-ok">✓ Copié !</div></div>`;
  } else {
    const sujet = `Quittance de loyer — ${fmtMois(q.debut)}`;
    const corps = `Bonjour ${l.nom.split(" ").pop()},\n\nVeuillez trouver ci-joint votre quittance de loyer pour ${fmtMois(q.debut)}.\n\nLogement : ${l.bien}\nPériode : du ${fmt(q.debut)} au ${fmt(q.fin)}\nMontant versé : ${euro(q.vers)}${q.msg?"\n\n"+q.msg:""}\n\nCordialement,\n${bn}`;
    const mailto = `mailto:${l.contact}?subject=${encodeURIComponent(sujet)}&body=${encodeURIComponent(corps)}`;
    el.innerHTML=`<div class="section"><div class="section-title">Email</div><div class="field" style="margin-bottom:8px"><label>Destinataire</label><input value="${l.contact}" readonly style="background:#f5f5f5"/></div><div class="field" style="margin-bottom:8px"><label>Sujet</label><input value="${sujet}" readonly style="background:#f5f5f5"/></div><div id="email-msg" class="msg-box">${corps}</div><div class="actions-row"><button class="btn btn-blue" onclick="copyMsg('email-msg','al-email')">📋 Copier</button><button class="btn btn-green" onclick="location.href='${mailto}'">📧 Ouvrir messagerie</button></div><div id="al-email" class="alert-ok">✓ Copié !</div></div>`;
  }
}

function copyMsg(id,alertId){
  navigator.clipboard.writeText(document.getElementById(id).textContent).then(()=>{
    const el=document.getElementById(alertId);el.style.display="block";
    setTimeout(()=>el.style.display="none",2000);
  });
}
function openWA(num){
  const txt=document.getElementById("wa-msg").textContent;
  window.open("https://wa.me/"+num+"?text="+encodeURIComponent(txt),"_blank");
}

/* ── Init ───────────────────────────────────────────── */
function initUI() {
  document.getElementById("b_nom").value = state.bailleur.nom;
  document.getElementById("b_adr").value = state.bailleur.adresse;
  const today = new Date().toISOString().split("T")[0];
  const [y,m] = today.split("-");
  const last = new Date(+y,+m,0).toISOString().split("T")[0];
  document.getElementById("q_debut").value = y+"-"+m+"-01";
  document.getElementById("q_fin").value = last;
  document.getElementById("q_deliv").value = today;
  renderLocs(); refreshSelects(); updatePreview(); updateStorageInfo();
}

loadState();
initUI();
</script>
